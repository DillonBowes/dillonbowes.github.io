      <div class="project-icon" data-title="The Economics of Wartime Trading"
     data-description="
        <p><strong>Behind the Analysis: The Making of The Economics of Wartime Trading</strong></p>
        
        <p>The project began as a personal research interest rather than a formal assignment. I was fascinated by how wars reshape economic landscapes, and I wanted to explore whether it was possible to model these changes in a way that an everyday investor could understand. My aim was to build something technically rigorous but still accessible, blending economic theory, scraped financial data, and historical analysis into a single framework.</p>

        <img src='assets/icon1.png' alt='Version 1 preview' class='phase-img'>

        <p>The first phase of the project was highly exploratory. I started by identifying the sectors that consistently shift during wartime; energy, defense, food systems, and cybersecurity. To ground my work, I turned to real-world data from government sources, company earnings, and industry reports. Much of this information wasn’t neatly packaged, so I used Python-based data scraping techniques to pull prices, company performance, and defense budget figures into workable datasets. Version 1 became a proof-of-concept: a paper rooted in optimization models that illustrated how volatility spikes and capital reallocates during conflict. It was math-heavy and theory-driven, but it gave me a foundation to work from.</p>

        <p>After reviewing that first version, I realized the analysis needed more context and depth. That’s what shaped phase two. Instead of talking about “defense” or “energy” in broad terms, I focused on specific companies like ExxonMobil, Cheniere Energy, Lockheed Martin, and Northrop Grumman. This shift grounded the paper in reality, tying abstract models to actual businesses whose performance reflected wartime dynamics. I also layered in historical parallels, such as the Russia-Ukraine war, to show how these patterns repeat themselves across conflicts. The second version transformed the project from a technical sketch into a more comprehensive, research-backed essay.</p>

        <p>The final version pulled everything together into a cohesive narrative. It combined rigorous financial modeling with company-level case studies and historical perspective, while also acknowledging the moral and human context behind wartime investing. This balance between technical analysis and broader storytelling was key. I wanted the project to not only demonstrate data-driven insights but also to highlight the complex realities that lie behind market behavior during conflict.</p>

        <p>Looking back, this project taught me how to take a curiosity-driven idea and develop it into a structured piece of research. The process involved scraping and cleaning messy datasets, cross-referencing multiple sources, and iterating until the work felt both technically sound and narratively compelling. Most importantly, it reinforced the value of self-directed explorationby following my own interests and pushing myself through multiple versions, I was able to create something that reflects both my technical skills and my ability to connect economic theory to real-world events.</p>

            Download full paper (PDF)
          </a>
        </p>

  data-description="
    <p><strong>Operationalizing AI Assurance: Translating Maturity and Risk Frameworks into Measurable Practice</strong></p>

    <p>This research develops a structured framework for translating high-level AI governance and risk management frameworks into measurable, operational assessment tools. It focuses on bridging the gap between descriptive standards (such as NIST AI RMF and MITRE AIMM) and implementable evaluation criteria used in real organizational settings.</p>

    <p>The core contribution is a heuristic AI assurance maturity model that decomposes enterprise AI governance into six standardized pillars: ethical and responsible use, strategy and resources, organization, technology enablers, data governance, and performance and application monitoring. Each pillar is mapped to measurable evidence indicators that enable consistent evaluation across organizations.</p>

    <img src='assets/icon3.png' alt='AI assurance framework preview' class='phase-img'>

    <p>The framework operationalizes existing standards including MITRE’s AI Maturity Model (AIMM) and the NIST AI Risk Management Framework by translating conceptual categories into diagnostic scoring criteria. This enables organizations to move from qualitative assessments toward repeatable, evidence-based assurance measurement.</p>

    <p>A key output of the work is a heatmap-based maturity matrix visualization tool that allows organizations to map capability maturity across the six assurance pillars. This tool supports comparative assessment, gap identification, and prioritization of remediation efforts in AI governance systems.</p>

    <p>The methodology draws from established capability maturity models but adapts them specifically for AI systems, emphasizing deployment realities such as model drift, governance gaps, and lifecycle monitoring rather than purely theoretical compliance structures.</p>

    <p>The research was presented at SPIE in Washington, D.C. and was peer-reviewed and published through SPIE Proceedings, reflecting external validation of the methodology and its applicability to applied AI assurance contexts.</p>

    <p><strong>Core contribution:</strong> A practical, evidence-based AI assurance maturity framework plus a heatmap matrix creator for operationalizing governance assessment.</p>

  data-description="
    <p><strong>Economies of Scale in Artificial Intelligence Innovation</strong></p>

    <p>This project examines whether artificial intelligence development exhibits economies of scale at the firm level. The central hypothesis is that AI systems have a cost structure characterized by large fixed costs (data infrastructure, compute, specialized labor) and low marginal deployment costs, which may advantage larger firms.</p>

    <img src='assets/icon4.png' alt='AI scale project preview' class='phase-img'>

    <p>The empirical strategy combines firm-level financial data from Compustat with AI-related patent data from the USPTO. AI innovation output is proxied using patent counts linked to firms, allowing for a quantitative assessment of innovation intensity across firm sizes.</p>

    <p>Regression analysis is used to estimate the relationship between firm size and AI innovation. Specifications include baseline OLS models, controls for R&D intensity and capital structure, industry-year fixed effects, nonlinear scaling terms, and firm fixed effects to account for unobserved heterogeneity.</p>

    <p>Results consistently show that AI patenting increases with firm size. Estimated elasticities of AI patent output with respect to employment range from approximately 0.15 to 0.23 across specifications. Nonlinear models suggest mild convexity, but the overall relationship remains sublinear, indicating increasing but diminishing returns to scale.</p>

    <p>Poisson count models confirm robustness, showing that larger firms generate more AI-related patents on average even after controlling for observable characteristics.</p>

    <p><strong>Core conclusion:</strong> AI innovation exhibits measurable economies of scale, with larger firms systematically advantaged in generating AI-related intellectual property.</p>
